name: Atualizando o GitHub CR7

## mecanismo para agendamento de update
on:
  schedule:
    # executa toda segunda e quinta-feira às 0h
    - cron: '0 3 * * 1,4'
  workflow_dispatch: ## criando um gatilho manual para update se necessário

jobs:
  update-data:
    runs-on: ubuntu-latest

    # sumindo com os warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # permissão para armazenamento e atualização
    permissions:
      contents: write

    steps:
      - name: Extrai o repositório
        uses: actions/checkout@v4

      - name: Configura o R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Instala dependências do sistema
        # dependência do tidyverse e rvest
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Instala pacotes R
        run: |
          install.packages(c("tidyverse", "rvest", "lubridate", "jsonlite", "glue"))
        shell: Rscript {0}

      - name: Executa o pipleine

        run: |
          source("R/00_runPipeline.R")
        shell: Rscript {0}

      - name: commita e faz o push
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add docs/index.html
          # O comando '|| echo' impede que o script trave se não houver mudanças no arquivo
          git commit -m "Update: Atualização da base de gols do CR7" || echo "Sem mudanças para commitar"
          git push
